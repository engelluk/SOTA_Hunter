<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      padding: 16px;
      background: #fafafa;
    }

    h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #1565c0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    h1 svg {
      flex-shrink: 0;
    }

    .field {
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 3px;
      font-size: 12px;
      color: #555;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #2196f3;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    .row .field {
      flex: 1;
    }

    .row .field:last-child {
      flex: 0 0 80px;
    }

    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 4px;
      background: #2196f3;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #1976d2;
    }

    button:active {
      background: #1565c0;
    }

    button:disabled {
      background: #bbb;
      cursor: wait;
    }

    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }

    .status.connected {
      display: block;
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #a5d6a7;
    }

    .status.disconnected {
      display: block;
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef9a9a;
    }

    .status-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .status.connected .status-indicator {
      background: #4caf50;
    }

    .status.disconnected .status-indicator {
      background: #f44336;
    }

    .footer {
      margin-top: 12px;
      text-align: center;
      font-size: 10px;
      color: #999;
    }
  </style>
</head>
<body>
  <h1>
    <svg viewBox="0 0 24 24" width="20" height="20" fill="#1565c0">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
    </svg>
    SOTA Hunter
  </h1>

  <div class="row">
    <div class="field">
      <label for="hrd-host">HRD Host</label>
      <input type="text" id="hrd-host" value="127.0.0.1" placeholder="127.0.0.1">
    </div>
    <div class="field">
      <label for="hrd-port">Port</label>
      <input type="number" id="hrd-port" value="7809" min="1" max="65535">
    </div>
  </div>

  <button id="save-btn">Save Settings</button>

  <div style="height: 8px;"></div>

  <button id="test-btn">Test Connection</button>

  <div id="status" class="status"></div>

  <div class="footer">
    Controls Yaesu FT-DX10 via HRD Rig Control
  </div>

  <script src="popup.js"></script>
</body>
</html>
